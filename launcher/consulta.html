<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar guia - Expresangil</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="consulta.css" />
</head>
<body>
  <div class="container">
    <header>
      <img class="logo-marca" src="/logo.svg" alt="Expresangil" />
      <h1>EXPRESANGIL</h1>
      <p class="subtitulo">Consulta el estado de tu guia</p>
    </header>

    <section class="opcion">
      <label>Numero de guia</label>
      <input type="text" id="guia" placeholder="Ej: 980941" autofocus />
      <button class="boton boton-accion" id="btn-consultar">Consultar</button>
    </section>

    <section class="opcion oculto" id="resultado">
      <h3 id="resultado-titulo"></h3>
      <p id="resultado-mensaje"></p>
    </section>

    <button class="boton boton-volver" id="btn-ingresar-panel">Ingresar al panel</button>

    <section class="opcion oculto" id="panel-acceso">
      <h3>Ingresar al panel</h3>
      <label>Usuario</label>
      <input type="text" id="panel-usuario" autocomplete="username" />
      <label>Contrasena del administrador</label>
      <input type="password" id="panel-password" autocomplete="current-password" />
      <button class="boton boton-accion" id="btn-panel-ingresar">Ingresar</button>
      <p id="panel-error" class="panel-error oculto"></p>
    </section>
  </div>

  <script src="consulta.js"></script>
</body>
</html>
